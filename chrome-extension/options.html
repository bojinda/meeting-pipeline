<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lesson Controller Options</title>
    <link rel="stylesheet" href="popup.css" />
    <style>
      body {
        min-width: 680px;
        max-width: 760px;
        margin: 24px auto;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>Lesson Controller Settings</h1>

      <section class="card">
        <h2>Controller Connection</h2>

        <div class="row">
          <label for="controllerUrl">Controller URL</label>
          <input
            id="controllerUrl"
            type="text"
            placeholder="http://192.168.0.105:8765"
          />
        </div>

        <div class="row">
          <label for="apiKey">API Key</label>
          <input
            id="apiKey"
            type="password"
            placeholder="Enter controller API key"
          />
        </div>

        <div class="actions">
          <button id="saveSettings">Save Settings</button>
          <button id="testConnection">Test Connection</button>
        </div>
      </section>

      <section class="card">
        <h2>Status</h2>
        <pre id="statusBox">Ready.</pre>
      </section>
    </main>

    <script src="options.js"></script>
  </body>
</html>
